<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>算法面试题库 · BytePrep</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#top" aria-label="BytePrep 首页"><span>BYTE</span>PREP</a>
    <div class="topbar-actions">
      <span id="timer" class="timer" aria-live="polite" hidden>45:00</span>
      <button id="start-mock" class="button primary">开始模拟</button>
      <button id="return-review" class="button ghost" hidden>返回复习</button>
    </div>
  </header>
  <main id="top" class="app-shell">
    <aside class="sidebar" aria-label="题库导航">
      <p class="eyebrow">INTERVIEW DRILL</p>
      <h1>算法手撕<br><em>复习题库</em></h1>
      <p class="intro">面向字节算法 / 大模型 / ASR 岗位的高频题与标准答题框架。</p>
      <label class="search-label" for="search-input">搜索题目</label>
      <input id="search-input" type="search" placeholder="例如：反转、Attention、CTC">
      <nav id="category-list" class="categories" aria-label="题型分类"></nav>
      <section class="progress-card" aria-label="学习进度">
        <p>学习进度</p>
        <strong id="progress-count">0 / 0</strong>
        <div class="progress-track"><i id="progress-bar"></i></div>
        <small>标记“已掌握”的题目会自动保存。</small>
      </section>
    </aside>
    <section class="question-pane" aria-label="题目列表">
      <div class="pane-heading">
        <div><p id="mode-label" class="eyebrow">REVIEW MODE</p><h2 id="list-title">全部题目</h2></div>
        <span id="result-count" class="count"></span>
      </div>
      <div id="mock-note" class="mock-note" hidden></div>
      <div id="question-list" class="question-list"></div>
      <div id="empty-state" class="empty-state" hidden>
        <p>没有找到匹配题目</p><button id="clear-search" class="text-button">清除筛选</button>
      </div>
    </section>
    <article id="question-detail" class="detail-pane" aria-live="polite"></article>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
